[project]
name = "digestif"
version = "0.1.0"
requires-python = "==3.14.3"
dependencies = [
    "aiohttp==3.13.4",
    "resend==2.26.0",
    "beautifulsoup4==4.14.3",
    "requests==2.33.1",
    "mistralai==2.2.0",
    "lxml-html-clean==0.4.4",
]

[dependency-groups]
dev = [
    "ruff==0.15.8",
    "ty==0.0.27",
    "pytest==9.0.2",
    "mdformat==1.0.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
